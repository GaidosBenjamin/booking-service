spring:
  application:
    name: booking-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  threads:
    virtual:
      enabled: true
  main:
    lazy-initialization: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    jwt:
      secret: ${JWT_SECRET}
      ttl: PT60M
    reset:
      ttl: PT30M
    verification:
      ttl: PT15M
    refresh:
      ttl: P30D
  mail:
    from: ${MAIL_FROM:no-reply@bbso.dev}
    brand-name: ${MAIL_BRAND:BBSO Kids}
  room-hold:
    ttl: PT15M

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/booking/success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/booking/failed}

management:
  health:
    mail:
      enabled: false

logging:
  level:
    com.bgaidos: ${BGAIDOS_LOG_LEVEL:DEBUG}

