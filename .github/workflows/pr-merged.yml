name: PR Merged

on:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, Push & Terraform Apply
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-central-1
      LIGHTSAIL_SERVICE: booking-service-container
      TF_DIR: booking-deployment/environments/prod
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_smtp_user: ${{ secrets.TF_VAR_SMTP_USER }}
      TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}
      TF_VAR_cors_allowed_origins: ${{ secrets.TF_VAR_CORS_ALLOWED_ORIGINS }}
      TF_VAR_stripe_api_key: ${{ secrets.TF_VAR_STRIPE_API_KEY }}
      TF_VAR_stripe_webhook_secret: ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
      TF_VAR_stripe_success_url: ${{ secrets.TF_VAR_STRIPE_SUCCESS_URL }}
      TF_VAR_stripe_cancel_url: ${{ secrets.TF_VAR_STRIPE_CANCEL_URL }}
      TF_VAR_mail_from: ${{ secrets.TF_VAR_MAIL_FROM }}
      TF_VAR_mail_brand: ${{ secrets.TF_VAR_MAIL_BRAND }}
      TF_VAR_log_level: ${{ secrets.TF_VAR_LOG_LEVEL }}
      TF_VAR_github_org: GaidosBenjamin
      TF_VAR_github_repo: booking-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::218014314930:role/github-actions-lightsail-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install lightsailctl
        run: |
          sudo curl -fsSL https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl \
            -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Build Docker image (linux/amd64)
        run: docker build --platform linux/amd64 -t booking-service:latest .

      - name: Push image to Lightsail registry
        id: push
        run: |
          OUTPUT=$(aws lightsail push-container-image \
            --region "$AWS_REGION" \
            --service-name "$LIGHTSAIL_SERVICE" \
            --label booking-service \
            --image booking-service:latest 2>&1)
          echo "$OUTPUT"
          IMAGE_TAG=$(echo "$OUTPUT" | grep -oP 'Refer to this image as ":[^"]*\.\K\d+')
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.14"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="container_image_tag=${{ steps.push.outputs.image_tag }}"
