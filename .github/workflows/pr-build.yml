name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 26

      - name: Install Maven 4.0.0-rc-5
        run: |
          curl -fsSL https://dlcdn.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz \
            | tar -xz -C /opt
          echo "/opt/apache-maven-4.0.0-rc-5/bin" >> "$GITHUB_PATH"

      - name: Build JAR
        run: mvn clean package -pl booking-service -am -q

      - name: Validate Docker image (linux/amd64)
        run: docker build --platform linux/amd64 -t booking-service:pr-${{ github.event.pull_request.number }} .
